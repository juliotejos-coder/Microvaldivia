<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Recorridos Transporte Público – Valdivia</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- VERSIÓN BASE ESTABLE + TARIFAS -->
<meta name="app-version" content="2026-04-21-08">

<!-- LEAFLET CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: Arial, sans-serif;
}

#map {
  width: 100%;
  height: 100%;
}

/* PANEL RECORRIDOS */
#panel {
  position: fixed;
  top: 0;
  left: 0;
  width: 260px;
  height: 100%;
  background: #ffffff;
  padding: 12px;
  overflow-y: auto;
  box-shadow: 4px 0 12px rgba(0,0,0,0.15);
  z-index: 1000;
}

#panel h3 {
  margin-top: 0;
  color: #0b5ed7;
}

.route {
  margin-bottom: 8px;
  font-size: 14px;
}

/* BOTONES */
.fab {
  position: fixed;
  bottom: 16px;
  z-index: 1100;
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  color: #ffffff;
  cursor: pointer;
  box-shadow: 0 6px 18px rgba(0,0,0,0.35);
}

#btn-recorridos {
  left: 16px;
  background: #0b5ed7;
}

#btn-tarifa {
  right: 16px;
  background: #dc3545;
}

/* PANEL TARIFAS */
#fare-panel {
  position: fixed;
  bottom: 70px;
  right: 16px;
  width: 260px;
  background: #ffffff;
  padding: 14px;
  border-radius: 14px;
  box-shadow: 0 10px 28px rgba(0,0,0,0.35);
  transform: translateX(120%);
  transition: transform 0.3s ease;
  z-index: 1200;
}

#fare-panel.open {
  transform: translateX(0);
}

#fare-close {
  position: absolute;
  top: 6px;
  right: 8px;
  border: none;
  background: none;
  font-size: 18px;
  cursor: pointer;
  color: #dc3545;
}

#fare-panel h4 {
  margin: 0 0 10px 0;
  color: #dc3545;
}

#fare-panel ul {
  padding-left: 18px;
  margin: 8px 0;
}

#fare-panel li {
  font-size: 14px;
  margin-bottom: 4px;
}

#fare-panel hr {
  border: none;
  border-top: 1px solid #ddd;
  margin: 8px 0;
}

/* RESPONSIVE */
@media (min-width: 769px) {
  #btn-recorridos {
    display: none;
  }
  #map {
    margin-left: 260px;
    width: calc(100% - 260px);
  }
}
</style>
</head>

<body>

<!-- PANEL RECORRIDOS -->
<div id="panel">
  <h3>🚌 Recorridos</h3>
  <div id="lista">Cargando recorridos…</div>
</div>

<button id="btn-recorridos" class="fab">Recorridos</button>

<!-- PANEL TARIFAS -->
<div id="fare-panel">
  <button id="fare-close">✖</button>
  <h4>Detalle de Tarifas<br><small>(desde 28/02/2026)</small></h4>
  <ul>
    <li>👤 <strong>Adulto Local:</strong> $590</li>
    <li>👵 <strong>Adulto Mayor Local:</strong> $290</li>
    <li>🎓 <strong>Estudiante Local:</strong> $190</li>
    <hr>
    <li>☁️ <strong>Adulto Niebla:</strong> $740</li>
    <li>☁️👵 <strong>Adulto Mayor Niebla:</strong> $370</li>
    <li>☁️🎓 <strong>Estudiante Niebla:</strong> $240</li>
  </ul>
  <div style="text-align:right;font-size:12px;color:#666">
    Proyecto: Julio Alveal Tejos
  </div>
</div>

<button id="btn-tarifa" class="fab">💲 Valor de la micro</button>

<div id="map"></div>

<!-- LEAFLET JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* MAPA */
const map = L.map('map').setView([-39.82, -73.25], 13);

L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  { subdomains: 'abcd', maxZoom: 19 }
).addTo(map);

/* BOTONES */
document.getElementById('btn-recorridos').onclick = () => {
  document.getElementById('panel').classList.toggle('open');
};

document.getElementById('btn-tarifa').onclick = () => {
  document.getElementById('fare-panel').classList.add('open');
};

document.getElementById('fare-close').onclick = () => {
  document.getElementById('fare-panel').classList.remove('open');
};

/* CARGA DE RECORRIDOS */
fetch('./data/index.json')
  .then(resp => {
    if (!resp.ok) throw new Error('No se pudo cargar index.json');
    return resp.json();
  })
  .then(routes => {
    const lista = document.getElementById('lista');
    lista.innerHTML = '';

    routes.forEach(rt => {
      const div = document.createElement('div');
      div.className = 'route';

      const cb = document.createElement('input');
      cb.type = 'checkbox';

      const label = document.createElement('span');
      label.textContent = ` ${rt.route_short_name} – ${rt.route_long_name}`;

      let layer = null;

      cb.onchange = () => {
        if (cb.checked) {
          fetch(`./data/${rt.archivo}`)
            .then(r => r.json())
            .then(gj => {
              layer = L.geoJSON(gj, {
                style: {
                  color: rt.color,
                  weight: 4,
                  opacity: 0.7
                }
              }).addTo(map);
            });
        } else {
          if (layer) map.removeLayer(layer);
        }
      };

      div.appendChild(cb);
      div.appendChild(label);
      lista.appendChild(div);
    });
  })
  .catch(err => {
    document.getElementById('lista').innerHTML =
      `<span style="color:red">Error cargando recorridos</span>`;
    console.error(err);
  });
</script>

</body>
</html>
