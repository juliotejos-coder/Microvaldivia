<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Recorridos Transporte Público – Valdivia</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="app-version" content="2026-04-21-15">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<!-- MarkerCluster -->
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: Arial, sans-serif;
}
#map { width:100%; height:100%; }

/* ===== PANEL RECORRIDOS ===== */
#panel {
  position: fixed;
  top: 0; left: 0;
  width: 260px; height: 100%;
  background: #ffffff;
  padding: 12px;
  overflow-y: auto;
  box-shadow: 4px 0 12px rgba(0,0,0,0.15);
  z-index: 1000;
  transform: translateX(-100%);
  transition: transform 0.3s ease;
}
#panel.open { transform: translateX(0); }
#panel h3 { margin:0 0 10px 0; color:#0b5ed7; }

/* ===== BOTONES ===== */
.fab {
  position: fixed;
  bottom: 16px;
  z-index: 1100;
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  color: #ffffff;
  cursor: pointer;
  box-shadow: 0 6px 18px rgba(0,0,0,0.35);
}
#btn-recorridos { left:16px; background:#0b5ed7; }
#btn-tarifa { right:16px; background:#dc3545; }

/* ===== PANEL TARIFAS ===== */
#fare-panel {
  position: fixed;
  bottom: 70px;
  right: 16px;
  width: 260px;
  background: #ffffff;
  padding: 14px;
  border-radius: 14px;
  box-shadow: 0 10px 28px rgba(0,0,0,0.35);
  transform: translateX(120%);
  transition: transform 0.3s ease;
  z-index: 1200;
}
#fare-panel.open { transform: translateX(0); }

#fare-close {
  position: absolute;
  top: 6px;
  right: 8px;
  border: none;
  background: none;
  font-size: 18px;
  cursor: pointer;
  color: #dc3545;
}

/* ===== FILTRO BAJO ZOOM ===== */
.leaflet-control-zoom .filter-btn {
  width: 34px;
  height: 34px;
  background: #0b5ed7;
  color: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 18px;
  border-top: 1px solid #ccc;
}

.filter-panel {
  position: absolute;
  top: 76px;
  right: 0;
  width: 190px;
  background: #ffffff;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 10px 24px rgba(0,0,0,0.3);
  transform: scaleY(0);
  transform-origin: top;
  transition: transform 0.25s ease;
  z-index: 1000;
}
.filter-panel.open { transform: scaleY(1); }

/* ===== LABEL JARDIN ===== */
.label-jardin {
  background: rgba(255,255,255,0.9);
  border-radius: 6px;
  padding: 2px 6px;
  font-size: 11px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}

/* ===== RESPONSIVE ===== */
@media (min-width: 769px) {
  #panel { transform: translateX(0); }
  #btn-recorridos { display: none; }
  #map {
    margin-left: 260px;
    width: calc(100% - 260px);
  }
}
</style>
</head>

<body>

<!-- PANEL RECORRIDOS -->
<div id="panel">
  <h3>🚌 Recorridos</h3>
  <div id="lista">Cargando recorridos…</div>
</div>

<button id="btn-recorridos" class="fab">Recorridos</button>

<!-- PANEL TARIFAS -->
<div id="fare-panel">
  <button id="fare-close">✖</button>

  <h4 style="margin-top:0;color:#dc3545">
    Detalle de Tarifas<br>
    <span style="font-size:13px;font-weight:normal">(desde 28/02/2026)</span>
  </h4>

  <div>👤 <strong>Adulto Local:</strong> $590</div>
  <div>👵 <strong>Adulto Mayor Local:</strong> $290</div>
  <div>🎓 <strong>Estudiante Local:</strong> $190</div>

  <hr>

  <div>☁️ <strong>Adulto Niebla:</strong> $740</div>
  <div>☁️👵 <strong>Adulto Mayor Niebla:</strong> $370</div>
  <div>☁️🎓 <strong>Estudiante Niebla:</strong> $240</div>

  <div style="margin-top:10px;font-size:12px;text-align:right;color:#666">
    Proyecto: Julio Alveal Tejos
  </div>
</div>

<button id="btn-tarifa" class="fab">💲 Valor de la micro</button>

<div id="map"></div>

<!-- JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>
/* ===== MAPA ===== */
const map = L.map('map',{zoomControl:false})
  .setView([-39.82,-73.25],13);

L.control.zoom({position:'topright'}).addTo(map);

L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {subdomains:'abcd',maxZoom:19}
).addTo(map);

/* ===== BOTONES ===== */
btn-recorridos.onclick = ()=> panel.classList.toggle('open');
btn-tarifa.onclick = ()=> fare-panel.classList.add('open');
fare-close.onclick = ()=> fare-panel.classList.remove('open');

/* ===== FILTRO BAJO ZOOM ===== */
setTimeout(()=>{
  const zoom=document.querySelector('.leaflet-control-zoom');
  const btn=document.createElement('div');
  btn.className='filter-btn';
  btn.innerHTML='🔍';
  zoom.appendChild(btn);

  const panelF=document.createElement('div');
  panelF.className='filter-panel';
  panelF.innerHTML=`
    <label>
      <input type="checkbox" id="chk-jardines">
      Jardines Integra
    </label>`;
  zoom.parentElement.appendChild(panelF);

  btn.onclick=()=>panelF.classList.toggle('open');
},400);

/* ===== RECORRIDOS ===== */
const capasRecorridos=[];
fetch('./data/index.json')
.then(r=>r.json())
.then(routes=>{
  lista.innerHTML='';
  routes.forEach(rt=>{
    const cb=document.createElement('input');
    cb.type='checkbox';
    let layer=null;

    cb.onchange=()=>{
      if(cb.checked){
        fetch(`./data/${rt.archivo}`)
        .then(r=>r.json())
        .then(gj=>{
          layer=L.geoJSON(gj,{
            style:{color:rt.color,weight:4,opacity:.7}
          }).addTo(map);
          capasRecorridos.push({nombre:`Micro ${rt.route_short_name}`,layer});
        });
      } else if(layer){
        map.removeLayer(layer);
      }
    };

    const div=document.createElement('div');
    div.append(cb,` Micro ${rt.route_short_name}`);
    lista.appendChild(div);
  });
});

/* ===== DISTANCIA ===== */
function distancia(latlng, poly){
  let min=Infinity;
  poly.getLatLngs().flat(2).forEach(p=>{
    min=Math.min(min,map.distance(latlng,p));
  });
  return min;
}

/* ===== JARDINES + CLUSTER ===== */
const cluster=L.markerClusterGroup({disableClusteringAtZoom:17});
const icon=L.icon({
  iconUrl:'./icons/jardines.png',
  iconSize:[30,30],
  iconAnchor:[15,28]
});

fetch('./data/jardines.json')
.then(r=>r.json())
.then(js=>{
  js.forEach(j=>{
    const m=L.marker([j.lat,j.lng],{icon})
      .bindTooltip(j.nombre,{
        permanent:true,
        direction:'top',
        offset:[0,-22],
        className:'label-jardin'
      })
      .on('click',()=>{
        const cerca=capasRecorridos
          .filter(r=>distancia(m.getLatLng(),r.layer)<200)
          .map(r=>r.nombre);

        m.bindPopup(
          cerca.length
            ? `<b>Micros cercanas</b><br>${cerca.join('<br>')}`
            : 'No hay micros cercanas'
        ).openPopup();
      });
    cluster.addLayer(m);
  });
});

document.addEventListener('change',e=>{
  if(e.target.id==='chk-jardines'){
    e.target.checked ? map.addLayer(cluster)
                     : map.removeLayer(cluster);
  }
});
</script>

</body>
</html>
