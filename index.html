<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Recorridos Transporte Público – Valdivia</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="app-version" content="2026-04-21-12">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: Arial, sans-serif;
}

#map {
  width: 100%;
  height: 100%;
}

/* ===== PANEL RECORRIDOS ===== */
#panel {
  position: fixed;
  top: 0;
  left: 0;
  width: 260px;
  height: 100%;
  background: #ffffff;
  padding: 12px;
  overflow-y: auto;
  box-shadow: 4px 0 12px rgba(0,0,0,0.15);
  z-index: 1000;
  transform: translateX(-100%);
  transition: transform 0.3s ease;
}

#panel.open {
  transform: translateX(0);
}

#panel h3 {
  margin: 0 0 10px 0;
  color: #0b5ed7;
}

/* ===== LISTA MICROS ===== */
.route {
  margin-bottom: 10px;
}

.route-header {
  display: flex;
  align-items: center;
  gap: 8px;
}

.route-title {
  font-weight: 600;
  cursor: pointer;
}

.route-detail {
  margin-left: 22px;
  font-size: 13px;
  color: #555;
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  transition: max-height 0.3s ease, opacity 0.25s ease;
}

.route-detail.open {
  max-height: 60px;
  opacity: 1;
}

/* ===== BOTONES ===== */
.fab {
  position: fixed;
  bottom: 16px;
  z-index: 1100;
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  color: #ffffff;
  cursor: pointer;
  box-shadow: 0 6px 18px rgba(0,0,0,0.35);
}

#btn-recorridos {
  left: 16px;
  background: #0b5ed7;
}

#btn-tarifa {
  right: 16px;
  background: #dc3545;
}

/* ===== PANEL TARIFAS ===== */
#fare-panel {
  position: fixed;
  bottom: 70px;
  right: 16px;
  width: 260px;
  background: #ffffff;
  padding: 14px;
  border-radius: 14px;
  box-shadow: 0 10px 28px rgba(0,0,0,0.35);
  transform: translateX(120%);
  transition: transform 0.3s ease;
  z-index: 1200;
}

#fare-panel.open {
  transform: translateX(0);
}

#fare-close {
  position: absolute;
  top: 6px;
  right: 8px;
  border: none;
  background: none;
  font-size: 18px;
  cursor: pointer;
  color: #dc3545;
}

@media (min-width: 769px) {
  #panel {
    transform: translateX(0);
  }
  #btn-recorridos {
    display: none;
  }
  #map {
    margin-left: 260px;
    width: calc(100% - 260px);
  }
}
</style>
</head>

<body>

<!-- PANEL -->
<div id="panel">
  <h3>🚌 Recorridos</h3>
  <div id="lista">Cargando recorridos…</div>
</div>

<button id="btn-recorridos" class="fab">Recorridos</button>

<!-- TARIFAS -->
<div id="fare-panel">
  <button id="fare-close">✖</button>
  <h4>Detalle de Tarifas<br><small>(desde 28/02/2026)</small></h4>
  <ul>
    <li>👤 Adulto Local: $590</li>
    <li>👵 Adulto Mayor Local: $290</li>
    <li>🎓 Estudiante Local: $190</li>
    <hr>
    <li>☁️ Adulto Niebla: $740</li>
    <li>☁️👵 Adulto Mayor Niebla: $370</li>
    <li>☁️🎓 Estudiante Niebla: $240</li>
  </ul>
  <div style="margin-top:10px;font-size:12px;color:#6b7280;text-align:right">
    Proyecto: Julio Alveal Tejos
  </div>
</div>

<button id="btn-tarifa" class="fab">💲 Valor de la micro</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* ===== MAPA ===== */
const map = L.map('map', {
  zoomControl: false
}).setView([-39.82, -73.25], 13);

L.control.zoom({
  position: 'topright'
}).addTo(map);

L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {
    subdomains: 'abcd',
    maxZoom: 19
  }
).addTo(map);

/* ===== BOTONES ===== */
document.getElementById('btn-recorridos').onclick = () => {
  document.getElementById('panel').classList.toggle('open');
};

document.getElementById('btn-tarifa').onclick = () => {
  document.getElementById('fare-panel').classList.add('open');
};

document.getElementById('fare-close').onclick = () => {
  document.getElementById('fare-panel').classList.remove('open');
};

/* ===== CARGA DE RECORRIDOS ===== */
fetch('./data/index.json')
  .then(resp => {
    if (!resp.ok) throw new Error('No se pudo cargar index.json');
    return resp.json();
  })
  .then(routes => {
    const lista = document.getElementById('lista');
    lista.innerHTML = '';

    routes.forEach(rt => {
      const div = document.createElement('div');
      div.className = 'route';

      const header = document.createElement('div');
      header.className = 'route-header';

      const cb = document.createElement('input');
      cb.type = 'checkbox';

      const title = document.createElement('span');
      title.className = 'route-title';
      title.textContent = `Micro ${rt.route_short_name}`;

      const detail = document.createElement('div');
      detail.className = 'route-detail';
      detail.textContent = rt.route_long_name;

      title.onclick = () => {
        detail.classList.toggle('open');
      };

      let layer = null;

      cb.onchange = () => {
        if (cb.checked) {
          fetch(`./data/${rt.archivo}`)
            .then(r => r.json())
            .then(gj => {
              layer = L.geoJSON(gj, {
                style: {
                  color: rt.color,
                  weight: 4,
                  opacity: 0.7
                }
              }).addTo(map);
            });
        } else {
          if (layer) map.removeLayer(layer);
        }
      };

      header.appendChild(cb);
      header.appendChild(title);
      div.appendChild(header);
      div.appendChild(detail);
      lista.appendChild(div);
    });
  })
  .catch(err => {
    document.getElementById('lista').innerHTML =
      '<span style="color:red">Error cargando recorridos</span>';
    console.error(err);
  });
</script>

</body>
</html>
``
