<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Recorridos Transporte Público – Valdivia</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- VERSION APP (cambiar en cada modificación) -->
<meta name="app-version" content="2026-04-20-04">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b5ed7">
<link rel="icon" href="icons/favicon.png">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
/* ===== BASE ===== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

#map {
  width: 100vw;
  height: 100vh;
}

/* ===== PANEL ===== */
#panel {
  position: fixed;
  top: 0;
  left: 0;
  width: 240px;
  height: 100vh;
  background: #ffffff;
  padding: 12px;
  overflow-y: auto;
  transform: translateX(-100%);
  transition: transform 0.3s ease;
  z-index: 1000;
  box-shadow: 4px 0 18px rgba(0,0,0,0.1);
}

#panel.open {
  transform: translateX(0);
}

#panel h3 {
  margin: 0 0 12px 0;
  font-size: 16px;
  color: #0b5ed7;
  border-bottom: 1px solid #e5e7eb;
  padding-bottom: 6px;
}

/* ===== LISTA DE RECORRIDOS ===== */
.route-item {
  margin-bottom: 10px;
}

.route-header {
  display: flex;
  align-items: center;
  gap: 8px;
}

.route-title {
  font-size: 14px;
  font-weight: 600;
  color: #111827;
  cursor: pointer;
}

/* ===== DETALLE ANIMADO ===== */
.route-detail {
  font-size: 13px;
  color: #4b5563;
  margin-left: 22px;
  margin-top: 2px;

  max-height: 0;
  opacity: 0;
  overflow: hidden;
  transition: max-height 0.3s ease, opacity 0.25s ease;
}

.route-detail.open {
  max-height: 80px; /* suficiente para 1–2 líneas */
  opacity: 1;
}

/* ===== BOTÓN TOGGLE ===== */
#toggle-panel {
  position: fixed;
  bottom: 16px;
  left: 12px;
  z-index: 1100;

  display: flex;
  align-items: center;
  gap: 8px;

  padding: 10px 14px;
  background: #0b5ed7;
  color: #ffffff;
  border: none;
  border-radius: 14px;

  font-size: 14px;
  font-weight: 600;
  cursor: pointer;

  box-shadow: 0 6px 18px rgba(0,0,0,0.35);
}

/* SVG */
#toggle-panel svg {
  width: 22px;
  height: 22px;
}

.line {
  fill: none;
  stroke: white;
  stroke-width: 8;
  stroke-linecap: round;
  transition: all 0.3s ease;
}

/* BOTÓN ABIERTO */
body.panel-open #toggle-panel {
  background: #dc3545;
}

body.panel-open .top {
  transform: rotate(45deg) translate(14px, -10px);
}
body.panel-open .middle {
  opacity: 0;
}
body.panel-open .bottom {
  transform: rotate(-45deg) translate(14px, 10px);
}

/* ===== ESCRITORIO ===== */
@media (min-width: 769px) {
  #panel {
    transform: translateX(0);
  }

  #toggle-panel {
    display: none;
  }

  #map {
    margin-left: 240px;
    width: calc(100vw - 240px);
  }
}
</style>
</head>

<body>

<!-- PANEL -->
<div id="panel">
  <h3>🚌 Recorridos</h3>
  <div id="lista">Cargando…</div>
</div>

<!-- BOTÓN -->
<button id="toggle-panel">
  <svg viewBox="0 0 100 100">
    <path class="line top" d="M20 30 H80"></path>
    <path class="line middle" d="M20 50 H80"></path>
    <path class="line bottom" d="M20 70 H80"></path>
  </svg>
  Recorridos
</button>

<!-- MAPA -->
<div id="map"></div>

<script>
/* ===== MAPA ===== */
const map = L.map('map', { zoomControl: false })
  .setView([-39.82, -73.25], 13);

L.control.zoom({ position: 'topright' }).addTo(map);

L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  { subdomains: 'abcd', maxZoom: 19 }
).addTo(map);

/* ===== PANEL TOGGLE ===== */
const panel = document.getElementById("panel");
const toggleBtn = document.getElementById("toggle-panel");

toggleBtn.onclick = () => {
  panel.classList.toggle("open");
  document.body.classList.toggle("panel-open");
};

/* ===== CARGA DE RUTAS ===== */
fetch("./data/index.json")
  .then(r => r.json())
  .then(routes => {
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    routes.forEach(rt => {
      fetch(`./data/${rt.archivo}`)
        .then(r => r.json())
        .then(gj => {

          const layer = L.geoJSON(gj, {
            style: { color: rt.color, weight: 4 }
          });

          const container = document.createElement("div");
          container.className = "route-item";

          const header = document.createElement("div");
          header.className = "route-header";

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";

          const title = document.createElement("span");
          title.className = "route-title";
          title.textContent = `Micro ${rt.route_short_name}`;

          header.appendChild(checkbox);
          header.appendChild(title);

          const detail = document.createElement("div");
          detail.className = "route-detail";
          detail.textContent = `${rt.route_id} - ${rt.route_long_name}`;

          title.onclick = () => {
            detail.classList.toggle("open");
          };

          checkbox.onchange = () => {
            if (checkbox.checked) {
              layer.addTo(map);
              panel.classList.remove("open");
              document.body.classList.remove("panel-open");
            } else {
              map.removeLayer(layer);
            }
          };

          container.appendChild(header);
          container.appendChild(detail);
          lista.appendChild(container);
        });
    });
  });

/* ===== PWA ===== */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
