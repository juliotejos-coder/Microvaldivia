<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Recorridos Transporte Público – Valdivia</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="app-version" content="2026-04-21-11">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial, sans-serif;
}
#map {
  width: 100%;
  height: 100%;
}

/* PANEL RECORRIDOS */
#panel {
  position: fixed;
  top: 0;
  left: 0;
  width: 240px;
  height: 100%;
  background: #fff;
  padding: 12px;
  overflow-y: auto;
  transform: translateX(-100%);
  transition: transform .3s ease;
  z-index: 1000;
  box-shadow: 4px 0 18px rgba(0,0,0,.1);
}
#panel.open { transform: translateX(0); }
#panel h3 { margin: 0 0 10px; color: #0b5ed7; }

/* LISTA MICROS */
.route-item { margin-bottom: 10px; }
.route-header {
  display: flex;
  align-items: center;
  gap: 8px;
}
.route-title {
  font-weight: 600;
  cursor: pointer;
}
.route-detail {
  margin-left: 22px;
  font-size: 13px;
  color: #555;
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  transition: .3s;
}
.route-detail.open {
  max-height: 80px;
  opacity: 1;
}

/* BOTONES FLOTANTES */
.fab {
  position: fixed;
  bottom: 16px;
  z-index: 1100;
  padding: 10px 14px;
  border: none;
  border-radius: 14px;
  font-weight: 600;
  color: #fff;
  cursor: pointer;
  box-shadow: 0 6px 18px rgba(0,0,0,.35);
}
#btn-recorridos { left: 12px; background: #0b5ed7; }
#btn-tarifa     { right: 12px; background: #dc3545; }

/* PANEL TARIFAS */
#fare-panel {
  position: fixed;
  bottom: 70px;
  right: 12px;
  width: 260px;
  background: #fff;
  padding: 14px;
  border-radius: 14px;
  box-shadow: 0 10px 28px rgba(0,0,0,.35);
  transform: translateX(120%);
  transition: .35s;
  z-index: 1200;
}
#fare-panel.open { transform: translateX(0); }
#fare-close {
  position: absolute;
  top: 6px;
  right: 8px;
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  color: #dc3545;
}

/* PANEL FILTRO */
#filter-panel {
  position: fixed;
  top: 110px;
  right: 12px;
  width: 260px;
  background: #fff;
  padding: 12px;
  border-radius: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,.35);
  transform: translateX(120%);
  transition: .3s;
  z-index: 1200;
}
#filter-panel.open { transform: translateX(0); }
#filter-close {
  position: absolute;
  top: 6px;
  right: 8px;
  border: none;
  background: none;
  cursor: pointer;
}

/* LABEL JARDINES */
.jardin-label {
  background: #fff;
  border: 1px solid #333;
  padding: 2px 6px;
  border-radius: 6px;
  font-size: 12px;
}

@media (min-width: 769px) {
  #panel { transform: translateX(0); }
  #btn-recorridos { display: none; }
  #map { margin-left: 240px; width: calc(100% - 240px); }
}
</style>
</head>

<body>

<div id="panel">
  <h3>🚌 Recorridos</h3>
  <div id="lista">Cargando…</div>
</div>

<button id="btn-recorridos" class="fab">Recorridos</button>

<div id="fare-panel">
  <button id="fare-close">✖</button>
  <h4>Detalle de Tarifas<br><small>(desde 28/02/2026)</small></h4>
  <ul>
    <li>👤 Adulto Local: $590</li>
    <li>👵 Adulto Mayor Local: $290</li>
    <li>🎓 Estudiante Local: $190</li>
    <hr>
    <li>☁️ Adulto Niebla: $740</li>
    <li>☁️👵 Adulto Mayor Niebla: $370</li>
    <li>☁️🎓 Estudiante Niebla: $240</li>
  </ul>
  <div style="text-align:right;font-size:12px;color:#666">
    Proyecto: Julio Alveal Tejos
  </div>
</div>

<button id="btn-tarifa" class="fab">💲 Valor de la micro</button>

<div id="filter-panel">
  <button id="filter-close">✖</button>
  <h4>Filtros</h4>
  <label>
    <input type="checkbox" id="chk-jardines">
    Jardines Fundación Integra
  </label>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* MAPA */
const map = L.map('map',{zoomControl:false})
  .setView([-39.82,-73.25],13);

L.control.zoom({position:'topright'}).addTo(map);
L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {subdomains:'abcd'}
).addTo(map);

/* BOTONES */
document.getElementById('btn-recorridos').onclick = () =>
  document.getElementById('panel').classList.toggle('open');

document.getElementById('btn-tarifa').onclick = () =>
  document.getElementById('fare-panel').classList.add('open');

document.getElementById('fare-close').onclick = () =>
  document.getElementById('fare-panel').classList.remove('open');

/* FILTRO */
const filterControl = L.Control.extend({
  options:{position:'topright'},
  onAdd:function(){
    const d = L.DomUtil.create('div','leaflet-bar leaflet-control');
    d.style.padding='8px';
    d.style.cursor='pointer';
    d.style.background='#fff';
    d.innerHTML='🔍 Filtro';
    d.onclick=()=>document.getElementById('filter-panel').classList.toggle('open');
    return d;
  }
});
map.addControl(new filterControl());

document.getElementById('filter-close').onclick = () =>
  document.getElementById('filter-panel').classList.remove('open');

/* JARDINES */
const jardines=[
 {n:'El Canelito',lat:-39.84273497,lon:-73.21693456},
 {n:'Cuncunita',lat:-39.80377064,lon:-73.20890803},
 {n:'Esperanza',lat:-39.83495914,lon:-73.25620091},
 {n:'Papelucho',lat:-39.81424785,lon:-73.22537407},
 {n:'Ensueño',lat:-39.84414188,lon:-73.22834071},
 {n:'Los Pinguinitos',lat:-39.80950032,lon:-73.25326488},
 {n:'Amanecer del Sol',lat:-39.85028842,lon:-73.22424813},
 {n:'Más Amigos',lat:-39.80763265,lon:-73.22226378},
 {n:'El Principito',lat:-39.84877164,lon:-73.24777587},
 {n:'Luz de los Ríos',lat:-39.80608479,lon:-73.22033078},
 {n:'Pequeña Misión de Jesús',lat:-39.85327560,lon:-73.23143306},
 {n:'Dulce Bebé',lat:-39.84420181,lon:-73.21486129},
 {n:'Rinconcito Feliz',lat:-39.85217911,lon:-73.23063825},
 {n:'Aneley',lat:-39.84482253,lon:-73.21738114},
 {n:'Estrellita de los Ríos',lat:-39.84933717,lon:-73.25387652},
 {n:'Sueños de Colores',lat:-39.83614405,lon:-73.20735074},
 {n:'Nube de Algodón',lat:-39.84786775,lon:-73.24595993},
 {n:'Sonrisa de Colores',lat:-39.82835055,lon:-73.24760519}
];

const jardinIcon = L.icon({
  iconUrl:'icons/jardin.png',
  iconSize:[36,36],
  iconAnchor:[18,36]
});

const jardinMarkers = jardines.map(j =>
  L.marker([j.lat,j.lon],{icon:jardinIcon})
    .bindTooltip(j.n,{permanent:true,direction:'top',offset:[0,-34],className:'jardin-label'})
);

document.getElementById('chk-jardines').onchange = e =>
  jardinMarkers.forEach(m => e.target.checked ? m.addTo(map) : map.removeLayer(m));
</script>

</body>
</html>
