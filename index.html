<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Recorridos Transporte Público – Valdivia</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="app-version" content="2026-04-21-14">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<!-- MarkerCluster -->
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: Arial, sans-serif;
}
#map { width:100%; height:100%; }

/* ===== PANEL RECORRIDOS ===== */
#panel {
  position: fixed;
  top: 0; left: 0;
  width: 260px; height: 100%;
  background: #fff;
  padding: 12px;
  overflow-y: auto;
  box-shadow: 4px 0 12px rgba(0,0,0,.15);
  z-index: 1000;
  transform: translateX(-100%);
  transition: transform .3s;
}
#panel.open { transform: translateX(0); }

/* ===== BOTONES ===== */
.fab {
  position: fixed;
  bottom: 16px;
  z-index: 1100;
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  color: #fff;
  cursor: pointer;
}
#btn-recorridos { left:16px; background:#0b5ed7; }
#btn-tarifa { right:16px; background:#dc3545; }

/* ===== FILTRO ===== */
.leaflet-control-filter .filter-btn {
  width:34px;height:34px;
  background:#0b5ed7;color:#fff;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.filter-panel {
  background:#fff;
  padding:10px;
  border-radius:10px;
  margin-top:6px;
  transform:scaleY(0);
  transform-origin:top;
  transition:.25s;
}
.filter-panel.open { transform:scaleY(1); }

/* ===== LABEL JARDÍN ===== */
.label-jardin {
  background: rgba(255,255,255,.9);
  border-radius:6px;
  padding:2px 6px;
  font-size:11px;
  box-shadow:0 2px 6px rgba(0,0,0,.3);
}

/* ===== RESPONSIVE ===== */
@media (min-width:769px){
  #panel { transform:translateX(0); }
  #btn-recorridos { display:none; }
  #map {
    margin-left:260px;
    width:calc(100% - 260px);
  }
}
</style>
</head>

<body>

<!-- PANEL -->
<div id="panel">
  <h3>🚌 Recorridos</h3>
  <div id="lista">Cargando recorridos…</div>
</div>

<button id="btn-recorridos" class="fab">Recorridos</button>
<button id="btn-tarifa" class="fab">💲 Valor</button>

<div id="map"></div>

<!-- JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>
/* ===== MAPA ===== */
const map = L.map('map',{zoomControl:false})
  .setView([-39.82,-73.25],13);

L.control.zoom({position:'topright'}).addTo(map);

L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {subdomains:'abcd',maxZoom:19}
).addTo(map);

document.getElementById('btn-recorridos').onclick = () =>
  panel.classList.toggle('open');

/* ===== CONTROL FILTRO ===== */
const FilterControl = L.Control.extend({
  options:{position:'topright'},
  onAdd(){
    const c = L.DomUtil.create('div','leaflet-control-filter');
    const b = L.DomUtil.create('div','filter-btn',c);
    b.innerHTML='🔍';
    const p = L.DomUtil.create('div','filter-panel',c);
    p.innerHTML = `
      <label>
        <input type="checkbox" id="chk-jardines">
        Jardines Integra
      </label>`;
    b.onclick = ()=> p.classList.toggle('open');
    L.DomEvent.disableClickPropagation(c);
    return c;
  }
});
map.addControl(new FilterControl());

/* ===== RECORRIDOS ===== */
const capasRecorridos = [];

fetch('./data/index.json')
.then(r=>r.json())
.then(routes=>{
  lista.innerHTML='';
  routes.forEach(rt=>{
    const cb=document.createElement('input');
    cb.type='checkbox';

    let layer=null;
    cb.onchange=()=>{
      if(cb.checked){
        fetch(`./data/${rt.archivo}`)
        .then(r=>r.json())
        .then(gj=>{
          layer=L.geoJSON(gj,{
            style:{color:rt.color,weight:4,opacity:.7}
          }).addTo(map);
          capasRecorridos.push({
            nombre:`Micro ${rt.route_short_name}`,
            layer
          });
        });
      } else if(layer){
        map.removeLayer(layer);
      }
    };

    const div=document.createElement('div');
    div.append(cb,` Micro ${rt.route_short_name}`);
    lista.appendChild(div);
  });
});

/* ===== DISTANCIA ===== */
function distanciaPuntoLinea(latlng, poly){
  let min=999999;
  poly.getLatLngs().flat(2).forEach(p=>{
    min=Math.min(min,map.distance(latlng,p));
  });
  return min;
}

/* ===== JARDINES + CLUSTER ===== */
const iconJardin=L.icon({
  iconUrl:'./icons/jardines.png',
  iconSize:[30,30],
  iconAnchor:[15,28]
});

const clusterJardines=L.markerClusterGroup({
  disableClusteringAtZoom:17,
  maxClusterRadius:50
});

fetch('./data/jardines.json')
.then(r=>r.json())
.then(jardines=>{
  jardines.forEach(j=>{
    const m=L.marker([j.lat,j.lng],{icon:iconJardin})
      .bindTooltip(j.nombre,{
        permanent:true,
        direction:'top',
        offset:[0,-22],
        className:'label-jardin'
      })
      .on('click',()=>{
        const cerca = capasRecorridos
          .filter(r=>distanciaPuntoLinea(m.getLatLng(),r.layer)<200)
          .map(r=>r.nombre);

        m.bindPopup(
          cerca.length
            ? `<b>Micros cercanas</b><br>${cerca.join('<br>')}`
            : 'No hay micros cercanas'
        ).openPopup();
      });
    clusterJardines.addLayer(m);
  });
});

document.addEventListener('change',e=>{
  if(e.target.id==='chk-jardines'){
    e.target.checked
      ? map.addLayer(clusterJardines)
      : map.removeLayer(clusterJardines);
  }
});
</script>

</body>
</html>
