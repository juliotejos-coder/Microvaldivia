<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Recorridos Transporte Público – Valdivia</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="app-version" content="2026-04-21-12">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: Arial, sans-serif;
}

#map {
  width: 100%;
  height: 100%;
}

/* ===== PANEL RECORRIDOS ===== */
#panel {
  position: fixed;
  top: 0;
  left: 0;
  width: 260px;
  height: 100%;
  background: #ffffff;
  padding: 12px;
  overflow-y: auto;
  box-shadow: 4px 0 12px rgba(0,0,0,0.15);
  z-index: 1000;
  transform: translateX(-100%);
  transition: transform 0.3s ease;
}

#panel.open {
  transform: translateX(0);
}

#panel h3 {
  margin: 0 0 10px 0;
  color: #0b5ed7;
}

/* ===== LISTA MICROS ===== */
.route {
  margin-bottom: 10px;
}

.route-header {
  display: flex;
  align-items: center;
  gap: 8px;
}

.route-title {
  font-weight: 600;
  cursor: pointer;
}

.route-detail {
  margin-left: 22px;
  font-size: 13px;
  color: #555;
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  transition: max-height 0.3s ease, opacity 0.25s ease;
}

.route-detail.open {
  max-height: 60px;
  opacity: 1;
}

/* ===== BOTONES ===== */
.fab {
  position: fixed;
  bottom: 16px;
  z-index: 1100;
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  color: #ffffff;
  cursor: pointer;
  box-shadow: 0 6px 18px rgba(0,0,0,0.35);
}

#btn-recorridos {
  left: 16px;
  background: #0b5ed7;
}

#btn-tarifa {
  right: 16px;
  background: #dc3545;
}

/* ===== PANEL TARIFAS ===== */
#fare-panel {
  position: fixed;
  bottom: 70px;
  right: 16px;
  width: 260px;
  background: #ffffff;
  padding: 14px;
  border-radius: 14px;
  box-shadow: 0 10px 28px rgba(0,0,0,0.35);
  transform: translateX(120%);
  transition: transform 0.3s ease;
  z-index: 1200;
}

#fare-panel.open {
  transform: translateX(0);
}

#fare-close {
  position: absolute;
  top: 6px;
  right: 8px;
  border: none;
  background: none;
  font-size: 18px;
  cursor: pointer;
  color: #dc3545;
}

/* ===== TARIFAS (ESTILO IMAGEN) ===== */
.fare-title {
  margin: 0 0 14px 0;
  font-size: 18px;
  color: #dc3545;
  line-height: 1.25;
}

.fare-title span {
  display: block;
  font-size: 13px;
  font-weight: normal;
}

.fare-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.fare-item {
  font-size: 15px;
  color: #111827;
}

.fare-divider {
  border: none;
  border-top: 1px solid #e5e7eb;
  margin: 12px 0;
}

.fare-footer {
  margin-top: 14px;
  font-size: 12px;
  color: #6b7280;
  text-align: right;
}

/* ===== RESPONSIVE ===== */
@media (min-width: 769px) {
  #panel {
    transform: translateX(0);
  }
  #btn-recorridos {
    display: none;
  }
  #map {
    margin-left: 260px;
    width: calc(100% - 260px);
  }
}
</style>
</head>

<body>

<!-- PANEL RECORRIDOS -->
<div id="panel">
  <h3>🚌 Recorridos</h3>
  <div id="lista">Cargando recorridos…</div>
</div>

<button id="btn-recorridos" class="fab">Recorridos</button>

<!-- PANEL TARIFAS -->
<div id="fare-panel">
  <button id="fare-close">✖</button>

  <h4 class="fare-title">
    Detalle de Tarifas
    <span>(desde 28/02/2026)</span>
  </h4>

  <div class="fare-group">
    <div class="fare-item">👤 <strong>Adulto Local:</strong> $590</div>
    <div class="fare-item">👵 <strong>Adulto Mayor Local:</strong> $290</div>
    <div class="fare-item">🎓 <strong>Estudiante Local:</strong> $190</div>
  </div>

  <hr class="fare-divider">

  <div class="fare-group">
    <div class="fare-item">☁️ <strong>Adulto Niebla:</strong> $740</div>
    <div class="fare-item">☁️👵 <strong>Adulto Mayor Niebla:</strong> $370</div>
    <div class="fare-item">☁️🎓 <strong>Estudiante Niebla:</strong> $240</div>
  </div>

  <div class="fare-footer">
    Proyecto: Julio Alveal Tejos
  </div>
</div>

<button id="btn-tarifa" class="fab">💲 Valor de la micro</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* ===== MAPA ===== */
const map = L.map('map', {
  zoomControl: false
}).setView([-39.82, -73.25], 13);

L.control.zoom({
  position: 'topright'
}).addTo(map);

L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {
    subdomains: 'abcd',
    maxZoom: 19
  }
).addTo(map);

/* ===== BOTONES ===== */
document.getElementById('btn-recorridos').onclick = () => {
  document.getElementById('panel').classList.toggle('open');
};

document.getElementById('btn-tarifa').onclick = () => {
  document.getElementById('fare-panel').classList.add('open');
};

document.getElementById('fare-close').onclick = () => {
  document.getElementById('fare-panel').classList.remove('open');
};

/* ===== CARGA DE RECORRIDOS ===== */
fetch('./data/index.json')
  .then(r => r.json())
  .then(routes => {
    const lista = document.getElementById('lista');
    lista.innerHTML = '';

    routes.forEach(rt => {
      const div = document.createElement('div');
      div.className = 'route';

      const header = document.createElement('div');
      header.className = 'route-header';

      const cb = document.createElement('input');
      cb.type = 'checkbox';

      const title = document.createElement('span');
      title.className = 'route-title';
      title.textContent = `Micro ${rt.route_short_name}`;

      const detail = document.createElement('div');
      detail.className = 'route-detail';
      detail.textContent = rt.route_long_name;

      title.onclick = () => detail.classList.toggle('open');

      let layer = null;

      cb.onchange = () => {
        if (cb.checked) {
          fetch(`./data/${rt.archivo}`)
            .then(r => r.json())
            .then(gj => {
              layer = L.geoJSON(gj, {
                style: {
                  color: rt.color,
                  weight: 4,
                  opacity: 0.7
                }
              }).addTo(map);
            });
        } else if (layer) {
          map.removeLayer(layer);
        }
      };

      header.appendChild(cb);
      header.appendChild(title);
      div.appendChild(header);
      div.appendChild(detail);
      lista.appendChild(div);
    });
  });
</script>

</body>
</html>
``
