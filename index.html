<meta name="app-version" content="2026-04-20-01">
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Recorridos Transporte Público – Valdivia</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b5ed7">
<link rel="icon" href="icons/favicon.png" type="image/png">

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
/* ===== BASE ===== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

#map {
  width: 100vw;
  height: 100vh;
}

/* ===== PANEL ===== */
#panel {
  position: fixed;
  top: 0;
  left: 0;
  width: 240px;
  height: 100vh;
  background: #ffffff;
  padding: 12px;
  overflow-y: auto;
  transform: translateX(-100%);
  transition: transform 0.25s ease;
  z-index: 1000;
  box-shadow: 4px 0 18px rgba(0,0,0,0.1);
}

#panel.open {
  transform: translateX(0);
}

#panel h3 {
  margin: 0 0 10px 0;
  font-size: 16px;
  color: #0b5ed7;
  border-bottom: 1px solid #e5e7eb;
  padding-bottom: 6px;
}

/* ===== LISTA ===== */
.route-item {
  margin-bottom: 10px;
}

.route-item summary {
  cursor: pointer;
  list-style: none;
  font-size: 14px;
  font-weight: 600;
  color: #111827;
}

.route-item summary::-webkit-details-marker {
  display: none;
}

.route-detail {
  font-size: 13px;
  color: #4b5563;
  margin-left: 16px;
  margin-top: 3px;
}

/* ===== BOTÓN ===== */
#toggle-panel {
  position: fixed;
  bottom: 16px;
  left: 12px;
  z-index: 1100;

  display: flex;
  align-items: center;
  gap: 8px;

  padding: 10px 14px;
  background: #0b5ed7;
  color: #ffffff;
  border: none;
  border-radius: 14px;

  font-size: 14px;
  font-weight: 600;

  cursor: pointer;
  box-shadow: 0 6px 18px rgba(0,0,0,0.35);
}

/* ===== SVG ===== */
#toggle-panel svg {
  width: 22px;
  height: 22px;
}

.line {
  fill: none;
  stroke: white;
  stroke-width: 8;
  stroke-linecap: round;
  transition: all 0.3s ease;
}

/* ===== BOTÓN ABIERTO ===== */
body.panel-open #toggle-panel {
  background: #dc3545;
}

body.panel-open .top {
  transform: rotate(45deg) translate(14px, -10px);
}
body.panel-open .middle {
  opacity: 0;
}
body.panel-open .bottom {
  transform: rotate(-45deg) translate(14px, 10px);
}

/* ===== DESKTOP ===== */
@media (min-width: 769px) {
  #panel {
    transform: translateX(0);
  }

  #toggle-panel {
    display: none;
  }

  #map {
    margin-left: 240px;
    width: calc(100vw - 240px);
  }
}
</style>
</head>

<body>

<!-- PANEL -->
<div id="panel">
  <h3>🚌 Recorridos</h3>
  <div id="lista">Cargando…</div>
</div>

<!-- BOTÓN (ÚNICO, NO LEAFLET) -->
<button id="toggle-panel">
  <svg viewBox="0 0 100 100">
    <path class="line top" d="M20 30 H80" />
    <path class="line middle" d="M20 50 H80" />
    <path class="line bottom" d="M20 70 H80" />
  </svg>
  Recorridos
</button>

<!-- MAPA -->
<div id="map"></div>

<script>
/* ===============================
   MAPA – SIN BOTONES EXTRA
   =============================== */
const map = L.map('map', {
  zoomControl: false
}).setView([-39.82, -73.25], 13);

// SOLO zoom (+ -), nada más
L.control.zoom({ position: 'topright' }).addTo(map);

L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {
    subdomains: 'abcd',
    maxZoom: 19
  }
).addTo(map);

/* ===============================
   BOTÓN PANEL
   =============================== */
const panel = document.getElementById("panel");
const toggleBtn = document.getElementById("toggle-panel");

toggleBtn.onclick = () => {
  panel.classList.toggle("open");
  document.body.classList.toggle("panel-open");
};

/* ===============================
   CARGA DE RUTAS
   =============================== */
fetch("./data/index.json")
  .then(r => r.json())
  .then(routes => {
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    routes.forEach(rt => {
      fetch(`./data/${rt.archivo}`)
        .then(r => r.json())
        .then(gj => {
          const layer = L.geoJSON(gj, {
            style: { color: rt.color, weight: 4 }
          });

          const container = document.createElement("div");
          container.className = "route-item";

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";

          const details = document.createElement("details");

          const summary = document.createElement("summary");
          summary.textContent = `Micro ${rt.route_short_name}`;

          const info = document.createElement("div");
          info.className = "route-detail";
          info.textContent = `${rt.route_id} - ${rt.route_long_name}`;

          details.appendChild(summary);
          details.appendChild(info);

          checkbox.onchange = () => {
            if (checkbox.checked) {
              layer.addTo(map);
              panel.classList.remove("open");
              document.body.classList.remove("panel-open");
            } else {
              map.removeLayer(layer);
            }
          };

          container.appendChild(checkbox);
          container.appendChild(details);
          lista.appendChild(container);
        });
    });
  });

/* ===============================
   PWA
   =============================== */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
``
