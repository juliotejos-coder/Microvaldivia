<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Recorridos Transporte Público – Valdivia</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="app-version" content="2026-04-21-09">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial,sans-serif }
#map { width:100vw; height:100vh }

/* ===== PANEL RECORRIDOS ===== */
#panel {
  position:fixed; top:0; left:0; width:240px; height:100vh;
  background:#fff; padding:12px; overflow-y:auto;
  transform:translateX(-100%); transition:.3s; z-index:1000;
  box-shadow:4px 0 18px rgba(0,0,0,.1)
}
#panel.open { transform:translateX(0) }
#panel h3 { margin:0 0 10px; color:#0b5ed7 }

/* Lista micros */
.route-item { margin-bottom:10px }
.route-header { display:flex; align-items:center; gap:8px }
.route-title { font-weight:600; cursor:pointer }
.route-detail {
  margin-left:22px; font-size:13px; color:#555;
  max-height:0; opacity:0; overflow:hidden;
  transition:.3s
}
.route-detail.open { max-height:80px; opacity:1 }

/* ===== BOTONES ===== */
#toggle-panel, #fare-toggle {
  position:fixed; bottom:16px; z-index:1100;
  padding:10px 14px; border:none; border-radius:14px;
  font-weight:600; cursor:pointer; color:#fff;
  box-shadow:0 6px 18px rgba(0,0,0,.35)
}
#toggle-panel { left:12px; background:#0b5ed7 }
#fare-toggle { right:12px; background:#dc3545 }

/* ===== PANEL TARIFAS ===== */
#fare-panel {
  position:fixed; bottom:70px; right:12px; width:260px;
  background:#fff; padding:14px; border-radius:14px;
  box-shadow:0 10px 28px rgba(0,0,0,.35);
  transform:translateX(120%); transition:.35s; z-index:1200
}
#fare-panel.open { transform:translateX(0) }
#fare-close {
  position:absolute; top:6px; right:8px;
  background:none; border:none; font-size:18px;
  cursor:pointer; color:#dc3545
}
#fare-panel ul { padding-left:18px }
#fare-panel hr { border:none; border-top:1px solid #ddd }

/* ===== PANEL FILTRO ===== */
#filter-panel {
  position:fixed; top:110px; right:12px; width:260px;
  background:#fff; padding:12px; border-radius:12px;
  box-shadow:0 8px 24px rgba(0,0,0,.35);
  transform:translateX(120%); transition:.3s; z-index:1200
}
#filter-panel.open { transform:translateX(0) }
#filter-close { position:absolute; top:6px; right:8px;
  border:none; background:none; cursor:pointer }

/* Label jardines */
.jardin-label {
  background:#fff;
  border:1px solid #444;
  padding:2px 6px;
  border-radius:6px;
  font-size:12px
}

@media (min-width:769px){
  #panel { transform:translateX(0) }
  #toggle-panel { display:none }
  #map { margin-left:240px; width:calc(100vw - 240px) }
}
</style>
</head>

<body>

<div id="panel">
  <h3>🚌 Recorridos</h3>
  <div id="lista">Cargando…</div>
</div>
<button id="toggle-panel">Recorridos</button>

<!-- TARIFAS -->
<div id="fare-panel">
  <button id="fare-close">✖</button>
  <h4>Detalle de Tarifas<br><small>(desde 28/02/2026)</small></h4>
  <ul>
    <li>👤 Adulto Local: $590</li>
    <li>👵 Adulto Mayor Local: $290</li>
    <li>🎓 Estudiante Local: $190</li>
    <hr>
    <li>☁️ Adulto Niebla: $740</li>
    <li>☁️👵 Adulto Mayor Niebla: $370</li>
    <li>☁️🎓 Estudiante Niebla: $240</li>
  </ul>
  <div style="text-align:right;font-size:12px;color:#666">
    Proyecto: Julio Alveal Tejos
  </div>
</div>
<button id="fare-toggle">💲 Valor de la micro</button>

<!-- FILTRO -->
<div id="filter-panel">
  <button id="filter-close">✖</button>
  <h4>Filtros</h4>
  <label><input type="checkbox" id="chk-jardines"> Jardines Fundación Integra</label>
</div>

<div id="map"></div>

<script>
/* MAPA */
const map=L.map('map',{zoomControl:false}).setView([-39.82,-73.25],13);
L.control.zoom({position:'topright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd'}).addTo(map);

/* BOTÓN FILTRO */
const FilterControl=L.Control.extend({
 options:{position:'topright'},
 onAdd:()=>{
  const d=L.DomUtil.create('div','leaflet-bar leaflet-control');
  d.style.padding='8px'; d.style.background='#fff';
  d.innerHTML='🔍 Filtro';
  d.onclick=()=>document.getElementById('filter-panel').classList.toggle('open');
  return d;
 }
});
map.addControl(new FilterControl());

/* RECORRIDOS */
document.getElementById('toggle-panel').onclick=()=>panel.classList.toggle('open');

/* TARIFAS */
const farePanel=document.getElementById('fare-panel');
fare-toggle.onclick=()=>farePanel.classList.add('open');
fare-close.onclick=()=>farePanel.classList.remove('open');
map.on('click',()=>farePanel.classList.remove('open'));

/* JARDINES */
const jardines=[
 {n:'El Canelito',lat:-39.84273497,lon:-73.21693456},
 {n:'Cuncunita',lat:-39.80377064,lon:-73.20890803},
 {n:'Esperanza',lat:-39.83495914,lon:-73.25620091},
 {n:'Papelucho',lat:-39.81424785,lon:-73.22537407},
 {n:'Ensueño',lat:-39.84414188,lon:-73.22834071},
 {n:'Los Pingüinitos',lat:-39.80950032,lon:-73.25326488},
 {n:'Amanecer del Sol',lat:-39.85028842,lon:-73.22424813},
 {n:'Más Amigos',lat:-39.80763265,lon:-73.22226378},
 {n:'El Principito',lat:-39.84877164,lon:-73.24777587},
 {n:'Luz de los Ríos',lat:-39.80608479,lon:-73.22033078}
];

const iconJ=L.icon({iconUrl:'icons/jardin.png',iconSize:[36,36],iconAnchor:[18,36]});
const gardenMarkers=jardines.map(j=>L.marker([j.lat,j.lon],{icon:iconJ})
 .bindTooltip(j.n,{permanent:true,direction:'top',offset:[0,-34],className:'jardin-label'})
);

chk-jardines.onchange=e=>{
 gardenMarkers.forEach(m=>e.target.checked?m.addTo(map):map.removeLayer(m))
};
filter-close.onclick=()=>filter-panel.classList.remove('open');

/* CARGA RUTAS */
fetch('./data/index.json').then(r=>r.json()).then(rts=>{
 const lista=document.getElementById('lista'); lista.innerHTML='';
 rts.forEach(rt=>{
  fetch(`./data/${rt.archivo}`).then(r=>r.json()).then(gj=>{
   const halo=L.geoJSON(gj,{style:{color:'#000',weight:7,opacity:.15}});
   const ly=L.geoJSON(gj,{style:{color:rt.color,weight:4,opacity:.65}});
   const div=document.createElement('div'); div.className='route-item';
   const h=document.createElement('div'); h.className='route-header';
   const cb=document.createElement('input'); cb.type='checkbox';
   const t=document.createElement('span'); t.className='route-title';
   t.textContent=`Micro ${rt.route_short_name}`;
   const d=document.createElement('div'); d.className='route-detail';
   d.textContent=`${rt.route_id} - ${rt.route_long_name}`;
   t.onclick=()=>d.classList.toggle('open');
   cb.onchange=()=>cb.checked?(halo.addTo(map),ly.addTo(map)):(map.removeLayer(halo),map.removeLayer(ly));
   h.append(cb,t); div.append(h,d); lista.append(div);
  });
 });
});
</script>

</body>
</html>
``
