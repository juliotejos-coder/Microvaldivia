<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Recorridos Transporte Público – Valdivia</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- CAMBIAR ESTE VALOR EN CADA MODIFICACIÓN -->
<meta name="app-version" content="2026-04-21-06">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b5ed7">
<link rel="icon" href="icons/favicon.png">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
/* ===== BASE ===== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
}
#map {
  width: 100vw;
  height: 100vh;
}

/* ===== PANEL RECORRIDOS ===== */
#panel {
  position: fixed;
  top: 0;
  left: 0;
  width: 240px;
  height: 100vh;
  background: #ffffff;
  padding: 12px;
  overflow-y: auto;
  transform: translateX(-100%);
  transition: transform 0.3s ease;
  z-index: 1000;
  box-shadow: 4px 0 18px rgba(0,0,0,0.1);
}
#panel.open {
  transform: translateX(0);
}
#panel h3 {
  margin: 0 0 12px 0;
  font-size: 16px;
  color: #0b5ed7;
  border-bottom: 1px solid #e5e7eb;
  padding-bottom: 6px;
}

/* ===== LISTA MICROS ===== */
.route-item { margin-bottom: 10px; }
.route-header {
  display: flex;
  align-items: center;
  gap: 8px;
}
.route-title {
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.route-detail {
  font-size: 13px;
  color: #4b5563;
  margin-left: 22px;
  margin-top: 2px;
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  transition: max-height 0.3s ease, opacity 0.25s ease;
}
.route-detail.open {
  max-height: 80px;
  opacity: 1;
}

/* ===== BOTÓN RECORRIDOS ===== */
#toggle-panel {
  position: fixed;
  bottom: 16px;
  left: 12px;
  z-index: 1100;
  padding: 10px 14px;
  background: #0b5ed7;
  color: #fff;
  border: none;
  border-radius: 14px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 6px 18px rgba(0,0,0,0.35);
}

/* ===== BOTÓN TARIFAS ===== */
#fare-toggle {
  position: fixed;
  bottom: 16px;
  right: 12px;
  z-index: 1100;
  padding: 10px 14px;
  background: #dc3545;
  color: #fff;
  border: none;
  border-radius: 14px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 6px 18px rgba(0,0,0,0.35);
}

/* ===== PANEL TARIFAS (SLIDE) ===== */
#fare-panel {
  position: fixed;
  top: 0;
  right: 0;
  width: 280px;
  height: 100vh;
  background: #ffffff;
  padding: 16px;
  box-shadow: -6px 0 28px rgba(0,0,0,0.35);
  transform: translateX(100%);
  transition: transform 0.35s ease;
  z-index: 1200;
}
#fare-panel.open { transform: translateX(0); }
#fare-panel h4 {
  margin: 0 0 12px;
  color: #dc3545;
}
#fare-panel ul {
  list-style: none;
  padding-left: 0;
}
#fare-panel li {
  margin-bottom: 6px;
  font-size: 14px;
}
#fare-panel hr {
  border: none;
  border-top: 1px solid #e5e7eb;
  margin: 10px 0;
}

/* ===== ICONOS SVG ===== */
.fare-icon {
  width: 16px;
  height: 16px;
  margin-right: 6px;
  vertical-align: middle;
  fill: none;
  stroke: #374151;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* ===== DESKTOP ===== */
@media (min-width: 769px) {
  #panel { transform: translateX(0); }
  #toggle-panel { display: none; }
  #map {
    margin-left: 240px;
    width: calc(100vw - 240px);
  }
}
</style>
</head>

<body>

<!-- PANEL RECORRIDOS -->
<div id="panel">
  <h3>🚌 Recorridos</h3>
  <div id="lista">Cargando…</div>
</div>

<button id="toggle-panel">Recorridos</button>

<!-- PANEL TARIFAS -->
<div id="fare-panel">
  <h4>Detalle de Tarifas<br><small>(desde 28/02/2026)</small></h4>
  <ul>
    <li><svg class="fare-icon" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M5.5 21v-1a6.5 6.5 0 0 1 13 0v1"/></svg><strong>Adulto Local:</strong> $590</li>
    <li><svg class="fare-icon" viewBox="0 0 24 24"><circle cx="12" cy="8" r="3"/><path d="M6 22v-2a6 6 0 0 1 12 0v2"/></svg><strong>Adulto Mayor Local:</strong> $290</li>
    <li><svg class="fare-icon" viewBox="0 0 24 24"><path d="M22 10v6l-10 5-10-5v-6"/><path d="M2 10l10-5 10 5"/></svg><strong>Estudiante Local:</strong> $190</li>
    <hr>
    <li><svg class="fare-icon" viewBox="0 0 24 24"><path d="M17.5 19a5.5 5.5 0 0 0 0-11h-1A7 7 0 1 0 6 18"/></svg><strong>Adulto Niebla:</strong> $740</li>
    <li><svg class="fare-icon" viewBox="0 0 24 24"><path d="M17.5 19a5.5 5.5 0 0 0 0-11h-1A7 7 0 1 0 6 18"/><circle cx="12" cy="8" r="3"/></svg><strong>Adulto Mayor Niebla:</strong> $370</li>
    <li><svg class="fare-icon" viewBox="0 0 24 24"><path d="M17.5 19a5.5 5.5 0 0 0 0-11h-1A7 7 0 1 0 6 18"/><path d="M22 12l-10 5-10-5"/></svg><strong>Estudiante Niebla:</strong> $240</li>
  </ul>
  <div style="margin-top:10px;font-size:12px;color:#6b7280;text-align:right">
    Proyecto: Julio Alveal Tejos
  </div>
</div>

<button id="fare-toggle">💲 Valor de la micro</button>

<div id="map"></div>

<script>
/* ===== MAPA ===== */
const map = L.map('map',{zoomControl:false})
  .setView([-39.82,-73.25],13);
L.control.zoom({position:'topright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd'}).addTo(map);

/* ===== PANEL RECORRIDOS ===== */
const panel=document.getElementById("panel");
document.getElementById("toggle-panel").onclick=()=>{
  panel.classList.toggle("open");
};

/* ===== PANEL TARIFAS ===== */
const farePanel=document.getElementById("fare-panel");
const fareToggle=document.getElementById("fare-toggle");
fareToggle.onclick=()=>{
  farePanel.classList.toggle("open");
  fareToggle.textContent = farePanel.classList.contains("open")
    ? "✖ Cerrar tarifas"
    : "💲 Valor de la micro";
};
map.on("click",()=>farePanel.classList.remove("open"));

/* ===== CARGA DE RUTAS ===== */
fetch("./data/index.json")
.then(r=>r.json())
.then(routes=>{
  const lista=document.getElementById("lista"); lista.innerHTML="";
  routes.forEach(rt=>{
    fetch(`./data/${rt.archivo}`).then(r=>r.json()).then(gj=>{
      const halo=L.geoJSON(gj,{style:{color:"#000",weight:7,opacity:0.15}});
      const layer=L.geoJSON(gj,{style:{color:rt.color,weight:4,opacity:0.65}});
      const c=document.createElement("div"); c.className="route-item";
      const h=document.createElement("div"); h.className="route-header";
      const cb=document.createElement("input"); cb.type="checkbox";
      const t=document.createElement("span"); t.className="route-title"; t.textContent=`Micro ${rt.route_short_name}`;
      h.append(cb,t);
      const d=document.createElement("div"); d.className="route-detail"; d.textContent=`${rt.route_id} - ${rt.route_long_name}`;
      t.onclick=()=>d.classList.toggle("open");
      cb.onchange=()=>{cb.checked?(halo.addTo(map),layer.addTo(map)):(map.removeLayer(halo),map.removeLayer(layer))};
      c.append(h,d); lista.appendChild(c);
    });
  });
});
</script>

</body>
</html>
